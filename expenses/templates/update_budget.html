{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

```
<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header">
                <h3>Update Monthly Budget</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Update Budget
                    </button>

                    <a
                        href="/"
                        class="btn btn-secondary"
                    >
                        Back
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>
```

</div>

{% endblock %}
